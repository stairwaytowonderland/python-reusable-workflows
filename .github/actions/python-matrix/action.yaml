# Prepare a Python version matrix from a comma-separated input string.
#
# Converts "3.11, 3.12" into a JSON array ["3.11","3.12"] suitable for
# strategy.matrix consumption, and exposes the count for conditional logic.

name: Prepare matrix
description: Parse a comma-separated Python version string into a JSON matrix array.

inputs:
  python-version:
    description: "Comma-separated Python version(s) (e.g. '3.11, 3.12')."
    required: false
    default: "3.12"

outputs:
  python-versions:
    description: "JSON array of Python versions for strategy.matrix."
    value: ${{ steps.set-matrix.outputs.python-versions }}
  python-version-count:
    description: "Number of Python versions in the matrix."
    value: ${{ steps.set-matrix.outputs.python-version-count }}

runs:
  using: composite
  steps:
    - name: Set Python version matrix
      id: set-matrix
      shell: bash
      run: |
        raw="${PYTHON_VERSION}"
        json=$(echo "$raw" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -Rc '[.,inputs]' | jq -sc 'add')
        echo "python-versions=$json" >> "$GITHUB_OUTPUT"
        echo "python-version-count=$(echo "$json" | jq 'length')" >> "$GITHUB_OUTPUT"
      env:
        PYTHON_VERSION: ${{ inputs.python-version }}
