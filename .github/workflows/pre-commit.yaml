name: Pre-commit

on:
  push:
    branches: ['**']
  workflow_dispatch:
  workflow_call:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: '--all-files'
          config: .pre-commit-ci.yaml
