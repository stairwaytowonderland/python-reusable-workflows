name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    # needs: [test]
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write # push commits/tags, create GitHub Releases
    with:
      config-file: 'releaserc.toml'
    secrets: inherit

  # -------------------------------------------------------------------------- #
  # Dispatch                                                                   #
  # Triggers publish.yaml via workflow_dispatch at the released tag.           #
  # In its own job so actions: write is only granted when a release was made.  #
  # -------------------------------------------------------------------------- #
  dispatch:
    name: Dispatch publish workflow
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      actions: write # trigger workflow_dispatch on publish.yaml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Action | Dispatch publish workflow
        uses: ./.github/actions/dispatch
        with:
          workflow: publish.yaml
          tag: ${{ needs.release.outputs.tag }}
          provenance: true
