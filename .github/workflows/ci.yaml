name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    # needs: [test]
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write # push commits/tags, create GitHub Releases
    with:
      config-file: 'releaserc.toml'
    secrets: inherit

  # -------------------------------------------------------------------------- #
  # Dispatch                                                                   #
  # Triggers publish.yaml via workflow_dispatch at the released tag.           #
  # In its own job so actions: write is only granted when a release was made.  #
  # -------------------------------------------------------------------------- #
  dispatch:
    name: Dispatch publish workflow
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      actions: write # trigger workflow_dispatch on publish.yaml

    steps:
      # GITHUB_TOKEN can trigger workflow_dispatch — this is an explicit
      # exception to GitHub's rule that GITHUB_TOKEN cannot trigger workflows.
      # https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
      - name: Action | Dispatch publish workflow
        run: |
          gh workflow run publish.yaml \
            --repo ${{ github.repository }} \
            --ref ${{ needs.release.outputs.tag }} \
            --field tag=${{ needs.release.outputs.tag }} \
            --field provenance=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
